<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .top-left {
            position: fixed;
            top: 0;
            left: 0;
            background-color: lavenderblush;
            padding: 10px;
        }
        .back-to-top {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background-color: lightgoldenrodyellow;
            padding: 10px;
            cursor: pointer;
        }
        .left-side {
            position: fixed;
            top: 50%;
            left: 0;
            background-color: lightblue;
            padding: 10px;
        }
        .right-side {
            position: fixed;
            top: 50%;
            right: 0;
            background-color: lightpink;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="top-left">Fixed Top Left</div>
    <div class="back-to-top" onclick="window.scrollTo(0,0)">Back to Top</div>
    <div class="left-side">Left Fixed</div>
    <div class="right-side">Right Fixed</div>
</body>
</html>
