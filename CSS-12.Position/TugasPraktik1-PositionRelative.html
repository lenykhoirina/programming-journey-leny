<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div{
            width: 200px;
            height: 200px;
        }
        .box1 {
            position:relative;
            right: 50px;
            bottom: 40px;
            top: 20px;
            background-color: lightblue;
            
        }

        .box2 {
            position:relative;
            top: 30px;
            bottom: 40px;
            left: 200px;
            background-color: lightgray;
            
        }

        .box3 {
            position:relative;
            top: 50px;
            bottom: 40px;
            left: 410px;
            background-color: lightpink;
            
        }
    </style>

</head>
<body>
    <div class="box1">Relative Box1</div>
    <div class="box2">Relative Box2</div>
    <div class="box3">Relative Box3</div>
</body>
</html>
