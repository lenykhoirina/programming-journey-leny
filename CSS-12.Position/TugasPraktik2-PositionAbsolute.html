<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            position: relative;
            width: 300px;
            height: 300px;
            background-color: lightgray;
        }
        .box {
            position: absolute;
            width: 90px;
            height: 90px;
        }
        .top-left {
            top: 0;
            left: 0;
            background-color: lightblue;
        }
        .top-right {
            top: 0;
            right: 0;
            background-color: lightcoral;
        }
        .bottom-left {
            bottom: 0; left: 0;
            background-color: lightpink;
        }
        .bottom-right {
            bottom: 0;
            right: 0;
            background-color: lightskyblue;
        }
    </style>
</head>
<body>
    <div class="container">
            <div class="box top-left">Box TL</div>
            <div class="box top-right">Box TR</div>
            <div class="box bottom-left">Box BL</div>
            <div class="box bottom-right">Box BR</div>
    </div>
</body>
</html>
