<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugasborder</title>
    <style>
        .solid {
            border: 3px solid blue;
            padding: 10px;
            background-color: rgb(140, 186, 227);
        }
        .dotted {
            border: 3px dotted red;
            padding: 10px;
            background-color: rgb(249, 149, 226);
        }
        .double {
            border: 5px double green;
            padding: 10px;
            background-color: rgb(157, 223, 157);
        }
        .dashed {
            border: 3px dashed pink;
            padding: 10px;
            background-color: rgb(208, 114, 114);
        }
        .groove {
            border: 3px groove rgb(26, 158, 158);
            padding: 10px;
            background-color: rgb(120, 146, 228);
        }
        .ridge {
            border: 5px ridge rgb(222, 117, 222);
            padding: 10px;
            background-color: rgb(224, 94, 94);
        }
    </style>
</head>
<body>
    <h2>Contoh Border CSS</h2>

     <p class="solid">Ini adalah border solid</p>
     <p class="dotted">Ini adalah border dotted</p>
     <p class="double">Ini adalah border double</p>
     <p class="dashed">Ini adalah border dashed</p>
     <p class="groove">Ini adalah border groove</p>
     <p class="ridge">Ini adalah border ridge</p>

</body>
</html>
