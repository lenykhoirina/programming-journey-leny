<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan1</title>
    <style>
        h1 {
            font-size: 3rem;
            color: #3e44ff;
            text-align: center;
            text-shadow: 
                1px 1px 0px #558ee2,
                2px 2px 0px #3c75c5,
                3px 3px 0px #719de8,
                4px 4px 0px #7a94e9,
                5px 5px 0px #4c79d3,
                10px 10px 20px rgba(0,0,0,0.5);
        }
        h2 {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
         .solid {
            border:3px solid rgb(116, 116, 230);
            padding: 10px;
            margin: 10px auto;
            width: 300px;
            text-align: center;
        }
        .double {
            border: 6px double rgba(121, 236, 121, 0.815);
            padding: 10px;
            margin: 10px auto;
            width: 300px;
            text-align: center;
        }
        .groove {
            border: 6px groove rgba(231, 158, 231, 0.927);
            padding: 10px;
            margin: 10px auto;
            width: 300px;
            text-align: center;
        }
        .ridge {
            border: 6px groove rgb(170, 107, 232);
            padding: 10px;
            margin: 10px auto;
            width: 300px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>EMPAT JENIS KOTAK</h1>
    <h2>Ini adalah hasil dari latihan 1</h2>
    <div class="solid">Garis Solid</div>
    <div class="double">Garis Double</div>
    <div class="groove">Garis Groove</div>
    <div class="ridge">Garis Ridge</div>
</body>
</html>
