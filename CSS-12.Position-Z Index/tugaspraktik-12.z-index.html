<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img {
            width: 300px;
            height: 300px;
            position: absolute;
        }
        .img1{
            z-index: 3;
        }
        .img2 {
            top: 200px;
            left: 150px;
            z-index: 2;
        }
        .img3 {
            top: 400px;
            left: 300px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <img src="gambar1.jpeg" alt="" class="img1">
    <img src="gambar2.jpeg" alt="" class="img2">
    <img src="gambar3.jpeg" alt="" class="img3">
</body>
</html>
